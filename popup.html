<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Link</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="Sortable.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Link Inventory</h1>
            <div class="sync-status" id="syncStatus">
                <button id="signInBtn" class="btn-sign-in" title="Sign in with Google to sync across devices">
                    <i class="fa-brands fa-google"></i> Sign In
                </button>
                <div id="userInfo" class="user-info" style="display: none;">
                    <img id="userAvatar" class="user-avatar" src="" alt="User">
                    <span id="userEmail" class="user-email"></span>
                    <button id="syncNowBtn" class="btn-sync" title="Sync now">
                        <i class="fa-solid fa-sync"></i>
                    </button>
                    <button id="signOutBtn" class="btn-sign-out" title="Sign out">
                        <i class="fa-solid fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by titles, links, descriptions">
            <button id="addCategoryBtn" class="btn-add-category">+ Add Category</button>
        </div>

        <div id="linksList" class="links-list"></div>

        <div class="footer">
            <span>Link Manager Extension By CD</span>
            <div class="footer-actions">
                <button id="exportBtn" class="btn-footer" title="Export All Data (JSON file)">Export Data</button>
                <button id="importBtn" class="btn-footer" title="Import Data (JSON file)">Import Data</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="firebase-auth.js"></script>
    <script src="sync-service.js"></script>
    <script src="popup.js"></script>
</body>

</html>
